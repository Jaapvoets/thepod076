<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Pod 076</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  height: 100vh;
  overflow: hidden;
  font-family: system-ui, Arial, sans-serif;
  background: black;
}

.slide {
  position: fixed;
  inset: 0;
  display: none;
}

.slide.active {
  display: block;
}

/* Afbeelding fullscreen */
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Zwarte slide standaard verborgen */
.black-slide {
  background: black;
}

/* Alleen zichtbaar als actief */
.black-slide.active {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Typemachine */
.typewriter {
  color: white;
  font-size: clamp(80px, 12vw, 160px);
  font-weight: 900;
  letter-spacing: 6px;
  border-right: 4px solid white;
  padding-right: 12px;
  white-space: nowrap;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { border-color: white; }
  25%, 75% { border-color: transparent; }
}
</style>
</head>
<body>

<!-- Eerst afbeelding -->
<div class="slide active" id="imageSlide">
  <img src="bg2.jpg" alt="">
</div>

<!-- Daarna zwart scherm -->
<div class="slide black-slide" id="blackSlide">
  <div class="typewriter" id="text"></div>
</div>

<script>
const imageSlide = document.getElementById("imageSlide");
const blackSlide = document.getElementById("blackSlide");

setTimeout(() => {
  imageSlide.classList.remove("active");
  blackSlide.classList.add("active");
  startTyping();
}, 4000);

const text = "Q1 2027";
let i = 0;

function startTyping() {
  const el = document.getElementById("text");
  el.textContent = "";

  function type() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      setTimeout(type, 150);
    }
  }

  type();
}
</script>

</body>
</html>
